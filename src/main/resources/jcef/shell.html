  <title>Claude Code</title>
  <!--CSS-->
</head>
<body>

    <div id="conversation">
      <div id="empty" class="empty-state">
        <div class="empty-mark">✶</div>
        <div class="empty-title">Claude Code</div>
        <div class="empty-sub">Ask Claude, or type / for commands.</div>
      </div>
    </div>
    <div id="dock">
      <div id="permissions"></div>
      <div id="composer"></div>
    </div>
    <div id="palette" hidden></div>
  </div>
  <!--LIBS-->
  <!--APP-->
</body>
</html>
